name: Deploy
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      # Hum check karenge ke files kahan hain aur unhein 'deploy_dist' folder mein copy karenge
      - run: |
          mkdir -p deploy_dist
          if [ -d ".caffeine/dist" ]; then cp -r .caffeine/dist/* deploy_dist/; 
          elif [ -d "dist" ]; then cp -r dist/* deploy_dist/; 
          else cp -r ./* deploy_dist/; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy_dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
