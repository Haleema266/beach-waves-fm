name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ FIX: pnpm pehle install hoga
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      # 🔍 Debug step (mujhe ye chahiye agar issue aaye)
      - name: Show files after build
        run: |
          echo "ROOT:"
          ls -la
          echo "SEARCH index.html:"
          find . -name "index.html"

      # 🎯 Auto detect build folder
      - name: Detect build folder
        id: detect
        run: |
          if [ -d "dist" ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
          elif [ -d ".caffeine/dist" ]; then
            echo "dir=.caffeine/dist" >> $GITHUB_OUTPUT
          else
            DIR=$(dirname $(find . -name "index.html" | head -n 1))
            echo "dir=$DIR" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
