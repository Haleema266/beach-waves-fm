name: Deploy
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      # Yeh step har jagah check karega ke index.html kahan hai
      - name: Find and Prepare Build
        run: |
          mkdir -p final_output
          if [ -d "dist" ]; then cp -r dist/* final_output/;
          elif [ -d ".caffeine/dist" ]; then cp -r .caffeine/dist/* final_output/;
          else
            # Agar koi dist folder na mile to poori repo ko output bana do
            cp -r ./* final_output/
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_output
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
