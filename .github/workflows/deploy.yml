name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      # 🔍 Debug: show project structure after build
      - name: Debug file tree
        run: |
          echo "==== ROOT FILES ===="
          ls -la
          echo "==== SEARCHING FOR index.html ===="
          find . -name "index.html"

      # 🎯 Detect build output folder automatically
      - name: Detect build output
        id: detect
        run: |
          if [ -d "dist" ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
          elif [ -d "build" ]; then
            echo "dir=build" >> $GITHUB_OUTPUT
          elif [ -d ".caffeine/dist" ]; then
            echo "dir=.caffeine/dist" >> $GITHUB_OUTPUT
          else
            # fallback: find folder containing index.html
            DIR=$(dirname $(find . -name "index.html" | head -n 1))
            if [ -z "$DIR" ]; then
              echo "❌ No build output found!"
              exit 1
            fi
            echo "dir=$DIR" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
